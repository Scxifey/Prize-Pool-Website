<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customers — Prize Pool</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #f5c518;
      --gold-dim: #c9a012;
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c27;
      --border: #2a2a3a;
      --text: #e8e8f0;
      --muted: #7070a0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #1a1508 0%, transparent 100%);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .btn-back {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 8px 16px;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn-back:hover {
      border-color: var(--gold-dim);
      color: var(--gold);
    }

    .logo {
      font-family: 'Bebas Neue', cursive;
      font-size: 1.8rem;
      color: var(--gold);
      letter-spacing: 0.08em;
    }

    .logo span {
      font-size: 0.8rem;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-left: 12px;
    }

    .btn-logout {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 8px 18px;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-logout:hover {
      border-color: #e05252;
      color: #e05252;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .section-title {
      font-family: 'Bebas Neue', cursive;
      font-size: 1.8rem;
      letter-spacing: 0.1em;
      color: var(--gold);
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .customer-count {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 4px 14px;
    }

    .search-wrap {
      position: relative;
      width: 280px;
    }

    .search-wrap input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px 10px 38px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      width: 100%;
      transition: border-color 0.2s;
    }

    .search-wrap input:focus {
      border-color: var(--gold-dim);
    }

    .search-wrap input::placeholder { color: var(--muted); }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 0.9rem;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
      animation: fadeUp 0.4s ease both;
    }

    .stat-card-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .stat-card-value {
      font-family: 'Bebas Neue', cursive;
      font-size: 2rem;
      color: var(--gold);
      letter-spacing: 0.05em;
    }

    .table-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      animation: fadeUp 0.4s ease both;
    }

    table { width: 100%; border-collapse: collapse; }

    th {
      background: var(--surface2);
      padding: 14px 20px;
      text-align: left;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--muted);
      font-weight: 500;
    }

    td {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      font-size: 0.9rem;
    }

    tr:hover td { background: var(--surface2); }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 99px;
      font-size: 0.75rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      margin: 2px;
    }

    .badge.gold {
      background: rgba(245, 197, 24, 0.1);
      border-color: var(--gold-dim);
      color: var(--gold);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .joined-date {
      color: var(--muted);
      font-size: 0.82rem;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 768px) {
      header { padding: 16px 20px; }
      main { padding: 24px 16px; }
      .search-wrap { width: 100%; }
      th, td { padding: 12px 14px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-left">
      <a href="/m8x92kp/dashboard.html" class="btn-back">← Back</a>
      <div class="logo">Prize Pool <span>Customers</span></div>
    </div>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </header>

  <main>

    <div class="stats-row">
      <div class="stat-card" style="animation-delay:0s">
        <div class="stat-card-label">Total Customers</div>
        <div class="stat-card-value" id="statTotal">—</div>
      </div>
      <div class="stat-card" style="animation-delay:0.1s">
        <div class="stat-card-label">Total Tickets</div>
        <div class="stat-card-value" id="statTickets">—</div>
      </div>
      <div class="stat-card" style="animation-delay:0.2s">
        <div class="stat-card-label">Avg Tickets/Customer</div>
        <div class="stat-card-value" id="statAvg">—</div>
      </div>
    </div>

    <div class="page-header">
      <div style="display:flex;align-items:center;gap:12px;">
        <div class="section-title">All Customers</div>
        <span class="customer-count" id="customerCount">0 customers</span>
      </div>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Search by name or email..." oninput="filterTable()">
      </div>
    </div>

    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Tickets</th>
            <th>Pools Entered</th>
            <th>Joined</th>
          </tr>
        </thead>
        <tbody id="usersTable">
          <tr><td colspan="5" class="empty-state">Loading customers...</td></tr>
        </tbody>
      </table>
    </div>

  </main>

  <script>
    let allUsers = [];

    async function checkAuth() {
      const res = await fetch('/api/admin/check');
      const data = await res.json();
      if (!data.isAdmin) window.location.href = '/m8x92kp/login.html';
    }

    async function loadUsers() {
      const res = await fetch('/api/admin/users');
      const data = await res.json();
      allUsers = data.users;

      const totalTickets = allUsers.reduce((sum, u) => sum + u.tickets.length, 0);
      const avg = allUsers.length > 0 ? (totalTickets / allUsers.length).toFixed(1) : 0;

      document.getElementById('statTotal').textContent = allUsers.length;
      document.getElementById('statTickets').textContent = totalTickets;
      document.getElementById('statAvg').textContent = avg;
      document.getElementById('customerCount').textContent = `${allUsers.length} customer${allUsers.length !== 1 ? 's' : ''}`;

      renderTable(allUsers);
    }

    function renderTable(users) {
      const tbody = document.getElementById('usersTable');

      if (users.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="empty-state">No customers found</td></tr>';
        return;
      }

      tbody.innerHTML = '';
      users.forEach(user => {
        const pools = [...new Set(user.tickets.map(t => t.pool.title))];
        const joined = new Date(user.createdAt).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><strong>${user.name}</strong></td>
          <td style="color: var(--muted)">${user.email}</td>
          <td><span class="badge gold">${user.tickets.length}</span></td>
          <td>${pools.map(p => `<span class="badge">${p}</span>`).join('')}</td>
          <td class="joined-date">${joined}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    function filterTable() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      const filtered = allUsers.filter(u =>
        u.name.toLowerCase().includes(query) ||
        u.email.toLowerCase().includes(query)
      );
      renderTable(filtered);
    }

    async function logout() {
      await fetch('/api/admin/logout', { method: 'POST' });
      window.location.href = '/m8x92kp/login.html';
    }

    checkAuth();
    loadUsers();
  </script>
</body>
</html>
