<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — Prize Pool</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #f5c518;
      --gold-dim: #c9a012;
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c27;
      --border: #2a2a3a;
      --text: #e8e8f0;
      --muted: #7070a0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #1a1508 0%, transparent 100%);
    }

    .logo {
      font-family: 'Bebas Neue', cursive;
      font-size: 1.8rem;
      color: var(--gold);
      letter-spacing: 0.08em;
    }

    .logo span {
      font-size: 0.8rem;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-left: 12px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn-customers {
      background: rgba(245, 197, 24, 0.08);
      border: 1px solid var(--gold-dim);
      color: var(--gold);
      padding: 8px 18px;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }

    .btn-customers:hover {
      background: rgba(245, 197, 24, 0.15);
      box-shadow: 0 4px 16px rgba(245, 197, 24, 0.15);
    }

    .btn-logout {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 8px 18px;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-logout:hover {
      border-color: #e05252;
      color: #e05252;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 50px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      animation: fadeUp 0.4s ease both;
      cursor: default;
      transition: border-color 0.2s;
    }

    .stat-card.clickable { cursor: pointer; }
    .stat-card.clickable:hover { border-color: var(--gold-dim); }

    .stat-card-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .stat-card-value {
      font-family: 'Bebas Neue', cursive;
      font-size: 2.4rem;
      color: var(--gold);
      letter-spacing: 0.05em;
    }

    .stat-card-hint {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 6px;
    }

    .section-title {
      font-family: 'Bebas Neue', cursive;
      font-size: 1.8rem;
      letter-spacing: 0.1em;
      color: var(--gold);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--border), transparent);
    }

    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      margin-bottom: 50px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
    }

    input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 11px 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--gold-dim);
      box-shadow: 0 0 0 3px rgba(245, 197, 24, 0.08);
    }

    input::placeholder { color: var(--muted); }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 11px 20px;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }

    .btn-gold {
      background: var(--gold);
      color: #0a0a0f;
      width: 100%;
    }

    .btn-gold:hover {
      background: #ffd700;
      box-shadow: 0 4px 20px rgba(245, 197, 24, 0.3);
      transform: translateY(-1px);
    }

    .btn-outline {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      width: 100%;
      margin-top: 8px;
    }

    .btn-outline:hover {
      border-color: var(--gold-dim);
      color: var(--gold);
    }

    .btn-delete {
      background: transparent;
      color: #e05252;
      border: 1px solid #e05252;
      width: 100%;
      margin-top: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 11px 20px;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-delete:hover {
      background: rgba(224, 82, 82, 0.1);
      box-shadow: 0 4px 20px rgba(224, 82, 82, 0.2);
    }

    #poolsGrid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 50px;
    }

    .pool-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
      animation: fadeUp 0.4s ease both;
      transition: border-color 0.2s;
    }

    .pool-card:hover { border-color: var(--gold-dim); }

    .pool-title {
      font-family: 'Bebas Neue', cursive;
      font-size: 1.5rem;
      letter-spacing: 0.06em;
      margin-bottom: 16px;
    }

    .pool-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .stat {
      background: var(--surface2);
      border-radius: 8px;
      padding: 10px 14px;
    }

    .stat-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .stat-value { font-size: 1rem; font-weight: 500; }
    .stat-value.gold { color: var(--gold); }

    .progress-wrap { margin-bottom: 16px; }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .progress-bar {
      height: 6px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold-dim), var(--gold));
      border-radius: 99px;
      box-shadow: 0 0 8px rgba(245, 197, 24, 0.4);
    }

    #toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 22px;
      font-size: 0.9rem;
      z-index: 999;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s ease;
    }

    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.success { border-color: var(--gold); color: var(--gold); }
    #toast.error { border-color: #e05252; color: #e05252; }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .confirm-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 300;
      align-items: center;
      justify-content: center;
      padding: 20px;
      backdrop-filter: blur(6px);
    }

    .confirm-overlay.open { display: flex; }

    .confirm-card {
      background: var(--surface);
      border: 1px solid #e05252;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      animation: fadeUp 0.3s ease;
    }

    .confirm-icon { font-size: 2.8rem; margin-bottom: 16px; }

    .confirm-title {
      font-family: 'Bebas Neue', cursive;
      font-size: 1.8rem;
      letter-spacing: 0.06em;
      color: #e05252;
      margin-bottom: 10px;
    }

    .confirm-message {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.6;
      margin-bottom: 8px;
    }

    .confirm-pool-name {
      color: var(--text);
      font-weight: 500;
      font-size: 1rem;
      margin-bottom: 28px;
    }

    .confirm-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .btn-confirm-cancel {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 12px 20px;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-confirm-cancel:hover {
      border-color: var(--gold-dim);
      color: var(--gold);
    }

    .btn-confirm-delete {
      background: #e05252;
      color: #fff;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-confirm-delete:hover {
      background: #c94040;
      box-shadow: 0 4px 20px rgba(224, 82, 82, 0.3);
    }

    .reveal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 200;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 20px;
      backdrop-filter: blur(8px);
    }

    .reveal-overlay.open { display: flex; }

    .reveal-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 500px;
      text-align: center;
    }

    .reveal-title {
      font-family: 'Bebas Neue', cursive;
      font-size: 1.4rem;
      letter-spacing: 0.2em;
      color: var(--muted);
      margin-bottom: 32px;
    }

    .number-display {
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      margin-bottom: 32px;
      position: relative;
      overflow: hidden;
    }

    .number-display::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, var(--bg) 0%, transparent 30%, transparent 70%, var(--bg) 100%);
      z-index: 1;
      pointer-events: none;
    }

    .number-rolling {
      font-family: 'Bebas Neue', cursive;
      font-size: 5rem;
      color: var(--gold);
      letter-spacing: 0.1em;
      text-shadow: 0 0 40px rgba(245, 197, 24, 0.6);
      line-height: 1;
    }

    .number-rolling.winner {
      font-size: 6rem;
      animation: winnerPulse 0.6s ease infinite alternate;
    }

    @keyframes winnerPulse {
      from { text-shadow: 0 0 20px rgba(245, 197, 24, 0.4); transform: scale(1); }
      to { text-shadow: 0 0 60px rgba(245, 197, 24, 0.9), 0 0 100px rgba(245, 197, 24, 0.4); transform: scale(1.05); }
    }

    .winner-reveal { display: none; animation: fadeUp 0.5s ease; }
    .winner-reveal.show { display: block; }

    .winner-reveal-name {
      font-family: 'Bebas Neue', cursive;
      font-size: 2.4rem;
      color: var(--gold);
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    .winner-reveal-email {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 24px;
    }

    .confetti {
      position: fixed;
      border-radius: 2px;
      animation: confettiFall linear forwards;
      z-index: 201;
    }

    @keyframes confettiFall {
      0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    .btn-close-reveal {
      background: var(--gold);
      color: #0a0a0f;
      border: none;
      border-radius: 8px;
      padding: 12px 32px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-close-reveal:hover {
      background: #ffd700;
      box-shadow: 0 4px 20px rgba(245, 197, 24, 0.3);
    }

    .spinning-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--muted);
      margin-top: 12px;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">Prize Pool <span>Admin Dashboard</span></div>
    <div class="header-actions">
      <a href="/m8x92kp/customers.html" class="btn-customers">👥 Customers</a>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </header>

  <main>

    <div class="stats-row">
      <div class="stat-card" style="animation-delay:0s">
        <div class="stat-card-label">Total Pools</div>
        <div class="stat-card-value" id="statPools">—</div>
      </div>
      <div class="stat-card" style="animation-delay:0.1s">
        <div class="stat-card-label">Total Tickets Sold</div>
        <div class="stat-card-value" id="statTickets">—</div>
      </div>
      <div class="stat-card clickable" style="animation-delay:0.2s" onclick="window.location.href='/m8x92kp/customers.html'">
        <div class="stat-card-label">Total Customers</div>
        <div class="stat-card-value" id="statCustomers">—</div>
        <div class="stat-card-hint">Click to view →</div>
      </div>
    </div>

    <div class="section-title">Create a Pool</div>
    <div class="form-card">
      <div class="form-grid">
        <div class="form-group">
          <label>Pool Title</label>
          <input type="text" id="newTitle" placeholder="e.g. PS5 Giveaway">
        </div>
        <div class="form-group">
          <label>Ticket Price (£)</label>
          <input type="number" id="newPrice" placeholder="5.00" min="0.01" step="0.01">
        </div>
        <div class="form-group">
          <label>Ticket Cap</label>
          <input type="number" id="newCap" placeholder="100" min="1">
        </div>
      </div>
      <button class="btn btn-gold" onclick="createPool()">＋ Create Pool</button>
    </div>

    <div class="section-title">Manage Pools</div>
    <div id="poolsGrid"><div class="empty-state">Loading pools...</div></div>

  </main>

  <!-- Delete Confirmation Modal -->
  <div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-card">
      <div class="confirm-icon">🗑</div>
      <div class="confirm-title">Delete Pool</div>
      <div class="confirm-message">You are about to permanently delete</div>
      <div class="confirm-pool-name" id="confirmPoolName"></div>
      <div class="confirm-message">This will remove all tickets and cannot be undone.</div>
      <div style="margin-top: 28px;" class="confirm-buttons">
        <button class="btn-confirm-cancel" onclick="closeConfirm()">Cancel</button>
        <button class="btn-confirm-delete" id="confirmDeleteBtn" onclick="confirmDelete()">🗑 Delete</button>
      </div>
    </div>
  </div>

  <!-- Winner Reveal Modal -->
  <div class="reveal-overlay" id="revealOverlay">
    <div class="reveal-card">
      <div class="reveal-title">🎰 Picking Winner</div>
      <div class="number-display">
        <div class="number-rolling" id="rollingNumber">000</div>
      </div>
      <div class="spinning-label" id="spinningLabel">Drawing ticket...</div>
      <div class="winner-reveal" id="winnerReveal">
        <div style="font-size: 2.5rem; margin-bottom: 12px;">🏆</div>
        <div class="winner-reveal-name" id="revealName"></div>
        <div class="winner-reveal-email" id="revealEmail"></div>
        <button class="btn-close-reveal" onclick="closeReveal()">Done</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    let poolToDelete = null;
    let btnToDelete = null;

    async function checkAuth() {
      const res = await fetch('/api/admin/check');
      const data = await res.json();
      if (!data.isAdmin) window.location.href = '/m8x92kp/login.html';
    }

    async function loadStats(pools, users) {
      const totalTickets = pools.reduce((sum, p) => sum + p.ticketsSold, 0);
      document.getElementById('statPools').textContent = pools.length;
      document.getElementById('statTickets').textContent = totalTickets;
      document.getElementById('statCustomers').textContent = users.length;
    }

    async function loadPools() {
      const res = await fetch('/api/pools');
      const data = await res.json();
      const grid = document.getElementById('poolsGrid');

      if (data.pools.length === 0) {
        grid.innerHTML = '<div class="empty-state">No pools yet — create one above!</div>';
        return data.pools;
      }

      grid.innerHTML = '';
      data.pools.forEach((pool, i) => {
        const pct = pool.ticketCap > 0 ? Math.round((pool.ticketsSold / pool.ticketCap) * 100) : 0;
        const card = document.createElement('div');
        card.className = 'pool-card';
        card.style.animationDelay = `${i * 0.08}s`;
        card.innerHTML = `
          <div class="pool-title">${pool.title}</div>
          <div class="pool-stats">
            <div class="stat">
              <div class="stat-label">Ticket Price</div>
              <div class="stat-value gold">£${pool.ticketPrice.toFixed(2)}</div>
            </div>
            <div class="stat">
              <div class="stat-label">Tickets Left</div>
              <div class="stat-value">${pool.ticketCap - pool.ticketsSold}</div>
            </div>
          </div>
          <div class="progress-wrap">
            <div class="progress-label">
              <span>${pool.ticketsSold} sold</span>
              <span>${pct}%</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill" style="width:${pct}%"></div>
            </div>
          </div>
          <button class="btn btn-outline" onclick="pickWinner(${pool.id}, this)">🏆 Pick Winner</button>
          <button class="btn-delete" onclick="openConfirm(${pool.id}, '${pool.title.replace(/'/g, "\\'")}', this)">🗑 Delete Pool</button>
        `;
        grid.appendChild(card);
      });

      return data.pools;
    }

    async function loadUsers() {
      const res = await fetch('/api/admin/users');
      const data = await res.json();
      return data.users;
    }

    async function createPool() {
      const title = document.getElementById('newTitle').value.trim();
      const ticketPrice = parseFloat(document.getElementById('newPrice').value);
      const ticketCap = parseInt(document.getElementById('newCap').value);

      if (!title || isNaN(ticketPrice) || isNaN(ticketCap)) {
        showToast('Please fill in all fields!', 'error');
        return;
      }

      const res = await fetch('/api/admin/pools', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, ticketPrice, ticketCap })
      });

      const data = await res.json();
      if (res.ok) {
        showToast(`"${data.pool.title}" created!`, 'success');
        document.getElementById('newTitle').value = '';
        document.getElementById('newPrice').value = '';
        document.getElementById('newCap').value = '';
        loadAll();
      } else {
        showToast(data.error, 'error');
      }
    }

    async function pickWinner(poolId, btn) {
      btn.disabled = true;
      btn.textContent = 'Picking...';

      try {
        const res = await fetch(`/api/admin/pools/${poolId}/winner`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({})
        });

        const data = await res.json();

        if (!res.ok) {
          showToast(data.error, 'error');
          btn.disabled = false;
          btn.textContent = '🏆 Pick Winner';
          return;
        }

        startReveal(data.winner);
      } catch (err) {
        showToast('Failed to pick winner.', 'error');
        btn.disabled = false;
        btn.textContent = '🏆 Pick Winner';
      }
    }

    function openConfirm(poolId, poolTitle, btn) {
      poolToDelete = poolId;
      btnToDelete = btn;
      document.getElementById('confirmPoolName').textContent = `"${poolTitle}"`;
      document.getElementById('confirmOverlay').classList.add('open');
    }

    function closeConfirm() {
      document.getElementById('confirmOverlay').classList.remove('open');
      poolToDelete = null;
      btnToDelete = null;
    }

    async function confirmDelete() {
      if (!poolToDelete) return;

      const btn = document.getElementById('confirmDeleteBtn');
      btn.disabled = true;
      btn.textContent = 'Deleting...';

      try {
        const res = await fetch(`/api/admin/pools/${poolToDelete}`, {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' }
        });

        const data = await res.json();

        if (res.ok) {
          closeConfirm();
          showToast('Pool deleted!', 'success');
          loadAll();
        } else {
          showToast(data.error, 'error');
        }
      } catch (err) {
        showToast('Failed to delete pool.', 'error');
      }

      btn.disabled = false;
      btn.textContent = '🗑 Delete';
    }

    function startReveal(winner) {
      const overlay = document.getElementById('revealOverlay');
      const rollingNumber = document.getElementById('rollingNumber');
      const spinningLabel = document.getElementById('spinningLabel');
      const winnerReveal = document.getElementById('winnerReveal');
      const revealName = document.getElementById('revealName');
      const revealEmail = document.getElementById('revealEmail');

      winnerReveal.classList.remove('show');
      rollingNumber.classList.remove('winner');
      rollingNumber.style.display = 'block';
      spinningLabel.style.display = 'block';
      spinningLabel.textContent = 'Drawing ticket...';
      overlay.classList.add('open');

      let speed = 50;
      let duration = 0;
      const totalDuration = 4000;
      let interval;

      function roll() {
        rollingNumber.textContent = String(Math.floor(Math.random() * 999) + 1).padStart(3, '0');
        duration += speed;

        if (duration < totalDuration * 0.6) speed = 50;
        else if (duration < totalDuration * 0.8) speed = 120;
        else if (duration < totalDuration * 0.95) speed = 250;
        else speed = 400;

        if (duration >= totalDuration) {
          clearInterval(interval);
          rollingNumber.textContent = String(winner.ticketId).padStart(3, '0');
          rollingNumber.classList.add('winner');
          spinningLabel.textContent = '🎉 Winning Ticket!';

          setTimeout(() => {
            rollingNumber.style.display = 'none';
            spinningLabel.style.display = 'none';
            revealName.textContent = `🏆 ${winner.name}`;
            revealEmail.textContent = winner.email;
            winnerReveal.classList.add('show');
            launchConfetti();
          }, 1500);
          return;
        }

        interval = setTimeout(roll, speed);
      }

      interval = setTimeout(roll, speed);
    }

    function launchConfetti() {
      const colors = ['#f5c518', '#ffd700', '#fff', '#c9a012', '#ff6b6b', '#4ecdc4'];
      for (let i = 0; i < 80; i++) {
        setTimeout(() => {
          const c = document.createElement('div');
          c.className = 'confetti';
          c.style.left = `${Math.random() * 100}vw`;
          c.style.background = colors[Math.floor(Math.random() * colors.length)];
          c.style.width = `${Math.random() * 10 + 6}px`;
          c.style.height = `${Math.random() * 10 + 6}px`;
          c.style.animationDuration = `${Math.random() * 2 + 2}s`;
          c.style.animationDelay = `${Math.random() * 0.5}s`;
          document.body.appendChild(c);
          setTimeout(() => c.remove(), 4000);
        }, i * 30);
      }
    }

    function closeReveal() {
      document.getElementById('revealOverlay').classList.remove('open');
      loadAll();
    }

    async function logout() {
      await fetch('/api/admin/logout', { method: 'POST' });
      window.location.href = '/m8x92kp/login.html';
    }

    function showToast(msg, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = `show ${type}`;
      setTimeout(() => { toast.className = ''; }, 3500);
    }

    async function loadAll() {
      const [pools, users] = await Promise.all([loadPools(), loadUsers()]);
      loadStats(pools, users);
    }

    checkAuth();
    loadAll();
  </script>
</body>
