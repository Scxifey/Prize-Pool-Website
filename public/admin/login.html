<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Prize Pool</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #f5c518;
      --gold-dim: #c9a012;
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c27;
      --border: #2a2a3a;
      --text: #e8e8f0;
      --muted: #7070a0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      animation: fadeUp 0.4s ease;
    }

    .logo {
      font-family: 'Bebas Neue', cursive;
      font-size: 2.5rem;
      color: var(--gold);
      text-shadow: 0 0 30px rgba(245, 197, 24, 0.3);
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      margin-bottom: 36px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }

    label {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
    }

    input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--gold-dim);
      box-shadow: 0 0 0 3px rgba(245, 197, 24, 0.08);
    }

    input::placeholder { color: var(--muted); }

    .btn {
      width: 100%;
      padding: 13px;
      background: var(--gold);
      color: #0a0a0f;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.2s;
    }

    .btn:hover {
      background: #ffd700;
      box-shadow: 0 4px 20px rgba(245, 197, 24, 0.3);
      transform: translateY(-1px);
    }

    .error {
      color: #e05252;
      font-size: 0.85rem;
      margin-top: 12px;
      display: none;
      text-align: center;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">Prize Pool</div>
    <div class="subtitle">Admin Access</div>

    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter username">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter password">
    </div>

    <button class="btn" onclick="login()">Login</button>
    <div class="error" id="errorMsg">Invalid username or password</div>
  </div>

  <script>
    async function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const errorMsg = document.getElementById('errorMsg');

      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (res.ok) {
          window.location.href = '/admin/dashboard.html';
        } else {
          errorMsg.style.display = 'block';
          errorMsg.textContent = data.error;
        }
      } catch (err) {
        errorMsg.style.display = 'block';
        errorMsg.textContent = 'Something went wrong, please try again.';
      }
    }

    // Allow pressing Enter to login
    document.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>
